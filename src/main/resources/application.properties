spring.application.name=glivt
server.port=8085
# ---------------------------------------------------------------------
# Datasource (MySQL). Values come from the environment - never hard-code
# production credentials. See .env.example.
# ---------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/glivt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Flyway owns the schema; Hibernate never mutates it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ---------------------------------------------------------------------
# Security / JWT
# ---------------------------------------------------------------------
app.jwt.secret=${APP_JWT_SECRET:change-me-in-env-this-is-a-dev-only-secret-32b}
app.jwt.access-token-ttl-minutes=${APP_JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-token-ttl-days=${APP_JWT_REFRESH_TTL_DAYS:30}
app.jwt.issuer=glivt

app.auth.single-session=${APP_AUTH_SINGLE_SESSION:false}
app.auth.login-max-attempts=${APP_AUTH_LOGIN_MAX_ATTEMPTS:5}
app.auth.login-window-minutes=${APP_AUTH_LOGIN_WINDOW_MINUTES:15}

# CORS allowed origins (comma-separated). Use explicit origins in production.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ---------------------------------------------------------------------
# Demo data seeding. Guarded so demo data never mixes with production.
# ---------------------------------------------------------------------
app.seed-demo=${APP_SEED_DEMO:false}

# ---------------------------------------------------------------------
# OpenAPI / Swagger
# ---------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---------------------------------------------------------------------
# Actuator (health only exposed by default)
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info

# Do not log sensitive payloads.
logging.level.org.springframework.security=INFO
