# Test profile - in-memory H2 (MySQL compatibility mode). Flyway is disabled
# and Hibernate creates the schema so JPA mappings and security are validated
# without a running MySQL. The MySQL Flyway DDL is exercised separately.
spring.datasource.url=jdbc:h2:mem:glivt;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

app.jwt.secret=test-secret-that-is-definitely-long-enough-1234567890
app.jwt.access-token-ttl-minutes=15
app.jwt.refresh-token-ttl-days=30
app.seed-demo=false
app.cors.allowed-origins=*
